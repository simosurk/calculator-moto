<!DOCTYPE html>\n<html>\n<head>\n    <title>Morocco Motorcycle Import Tax Calculator</title>\n</head>\n<body>\n    <h1>Morocco Motorcycle Import Tax Calculator</h1>\n    <form onsubmit="calculateTax(); return false;">\n        <label for="price">Price of Motorcycle (in MAD):</label>\n        <input type="number" id="price" required>\n        <br>\n        <label for="cc">Engine Capacity (in CC):</label>\n        <input type="number" id="cc" required>\n        <br>\n        <button type="submit">Calculate Tax</button>\n    </form>\n    <h2 id="result"></h2>\n    <script>\n        function calculateTax() {\n            var price = document.getElementById('price').value;\n            var cc = document.getElementById('cc').value;\n            var tax = 0;\n            // Tax calculation logic\n            if (cc < 125) {\n                tax = price * 0.1; // 10%\n            } else if (cc < 400) {\n                tax = price * 0.2; // 20%\n            } else {\n                tax = price * 0.3; // 30%\n            }\n            document.getElementById('result').innerText = 'Estimated Tax: ' + tax + ' MAD';\n        }\n    <\/script>\n</body>\n</html>
