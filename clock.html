<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        .clock {\n            text-align: center;\n        }\n        .time {\n            font-size: 3em;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <h1>Digital Clock</h1>\n        <div class="time" id="clock">Loading...</div>\n        <div id="timezones"></div>\n    </div>\n    <script>\n        function updateClock() {\n            const utc = new Date();\n            const timezones = [\n                {name: 'UTC', offset: 0},\n                {name: 'New York', offset: -5},\n                {name: 'London', offset: 0},\n                {name: 'Tokyo', offset: 9},\n                {name: 'Sydney', offset: 11} \n            ];\n            let timeHTML = '';\n            timezones.forEach(tz => {\n                const localTime = new Date(utc.getTime() + tz.offset * 3600 * 1000);\n                timeHTML += `<div>${tz.name}: ${localTime.toISOString().slice(0, 19).replace('T', ' ')}</div>`;\n            });\n            document.getElementById('timezones').innerHTML = timeHTML;\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    <\/script>\n</body>\n</html>
